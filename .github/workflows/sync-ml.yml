name: Sincronizar catálogo Mercado Libre

on:
  schedule:
    # 08:00 hora de Chile (UTC-3 aprox.) → 11:00 UTC
    - cron: "0 11 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sincronizar vía Cloudflare Worker (paginado)
        env:
          WORKER_URL: ${{ secrets.WORKER_SYNC_URL }}
          WORKER_SECRET: ${{ secrets.WORKER_SYNC_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${WORKER_URL:-}" ]; then
            echo "::error::Falta el secreto WORKER_SYNC_URL en GitHub (URL del Worker, ej. https://andes-autoparts-ml-sync.xxx.workers.dev)"
            exit 1
          fi
          if [ -z "${WORKER_SECRET:-}" ]; then
            echo "::error::Falta el secreto WORKER_SYNC_SECRET en GitHub"
            exit 1
          fi

          BASE="${WORKER_URL%/}"
          AUTH_URL_DEFAULT="https://auth.mercadolibre.cl/authorization?response_type=code&client_id=2004412570250603&redirect_uri=https%3A%2F%2Fandesautopartscl-sketch.github.io%2FWebAndesAutoParts%2F&scope=offline_access+read+write"
          ADMIN_RENEW_URL="https://andesautopartscl-sketch.github.io/WebAndesAutoParts/admin/renovar-token.html"

          AUTH_URL="$AUTH_URL_DEFAULT"
          if AUTH_JSON=$(curl -sS "${BASE}/auth-url" 2>/dev/null); then
            FETCHED=$(node -pe "try{const j=JSON.parse(process.argv[1]);process.stdout.write(j.auth_url||'')}catch(e){}" "$AUTH_JSON" 2>/dev/null || true)
            if [ -n "$FETCHED" ]; then
              AUTH_URL="$FETCHED"
            fi
          fi

          parse_error() {
            node -pe "try{JSON.parse(require('fs').readFileSync('/tmp/sync-response.json','utf8')).error}catch(e){''}" 2>/dev/null || true
          }

          handle_http_error() {
            local HTTP_CODE="$1"
            if [ "$HTTP_CODE" = "401" ]; then
              ERROR="$(parse_error)"
              if [ "$ERROR" = "TOKEN_EXPIRED" ]; then
                echo ""
                echo "=============================================="
                echo " TOKEN ML EXPIRADO — RENOVACIÓN REQUERIDA"
                echo "=============================================="
                echo ""
                echo "El access_token de Mercado Libre vence cada ~6 horas."
                echo ""
                echo "Renueva el token con un clic (panel admin):"
                echo ""
                echo "   ${ADMIN_RENEW_URL}"
                echo ""
                echo "Alternativa manual: ./renew-token-quick.sh"
                echo ""
                echo "=============================================="
                echo "::error::Token ML expirado. Renueva en: ${ADMIN_RENEW_URL}"
                exit 1
              fi
            fi

            if [ "$HTTP_CODE" != "200" ]; then
              ERROR="$(parse_error)"
              if [ "$ERROR" = "MISSING_TOKEN" ]; then
                echo ""
                echo "::error::No hay token ML en el Worker. Renueva en: ${ADMIN_RENEW_URL}"
                exit 1
              fi
              echo "::error::Sync falló con HTTP ${HTTP_CODE}"
              exit 1
            fi
          }

          OFFSET=0
          STEP=1
          while true; do
            echo "Llamando a ${BASE}/sync?offset=${OFFSET} (paso ${STEP}) ..."
            HTTP_CODE=$(curl -sS -o /tmp/sync-response.json -w "%{http_code}" \
              -H "Authorization: Bearer ${WORKER_SECRET}" \
              "${BASE}/sync?offset=${OFFSET}")
            cat /tmp/sync-response.json
            echo ""

            handle_http_error "$HTTP_CODE"

            OK=$(node -pe "JSON.parse(require('fs').readFileSync('/tmp/sync-response.json','utf8')).ok" 2>/dev/null || echo false)
            if [ "$OK" != "true" ]; then
              ERROR="$(parse_error)"
              if [ "$ERROR" = "TOKEN_EXPIRED" ]; then
                echo "::error::Token ML expirado. Renueva en: ${ADMIN_RENEW_URL}"
                exit 1
              fi
              echo "::error::El Worker respondió ok=false"
              exit 1
            fi

            DONE=$(node -pe "JSON.parse(require('fs').readFileSync('/tmp/sync-response.json','utf8')).done === true" 2>/dev/null || echo false)
            if [ "$DONE" = "true" ]; then
              PRODUCTS=$(node -pe "JSON.parse(require('fs').readFileSync('/tmp/sync-response.json','utf8')).products" 2>/dev/null || echo "?")
              echo "::notice::Catálogo sincronizado correctamente (${PRODUCTS} productos, commit en GitHub)"
              break
            fi

            NEXT=$(node -pe "JSON.parse(require('fs').readFileSync('/tmp/sync-response.json','utf8')).next_offset" 2>/dev/null || echo "")
            ACC=$(node -pe "JSON.parse(require('fs').readFileSync('/tmp/sync-response.json','utf8')).accumulated" 2>/dev/null || echo "?")
            TOTAL=$(node -pe "JSON.parse(require('fs').readFileSync('/tmp/sync-response.json','utf8')).total" 2>/dev/null || echo "?")
            echo "::notice::Lote ${STEP} OK — acumulados ${ACC}/${TOTAL}, siguiente offset=${NEXT}"

            if [ -z "$NEXT" ]; then
              echo "::error::El Worker no devolvió next_offset"
              exit 1
            fi

            OFFSET="$NEXT"
            STEP=$((STEP + 1))
          done
