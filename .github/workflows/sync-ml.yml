name: Sincronizar catálogo Mercado Libre

on:
  schedule:
    # 08:00 hora de Chile (aprox. UTC-3) → 11:00 UTC
    - cron: "0 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Crear .env desde secretos
        run: |
          cat > .env << EOF
          ML_CLIENT_ID=${{ secrets.ML_CLIENT_ID }}
          ML_CLIENT_SECRET=${{ secrets.ML_CLIENT_SECRET }}
          ML_REDIRECT_URI=${{ secrets.ML_REDIRECT_URI }}
          ML_REFRESH_TOKEN=${{ secrets.ML_REFRESH_TOKEN }}
          EOF

      - name: Sincronizar publicaciones
        run: npm run sync-ml

      - name: Guardar refresh_token actualizado
        if: success()
        run: |
          RT=$(grep '^ML_REFRESH_TOKEN=' .env | cut -d= -f2-)
          if [ -n "$RT" ]; then
            echo "::notice::Si ML_REFRESH_TOKEN cambió, actualiza el secreto en GitHub."
          fi

      - name: Commit y push de productos.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/productos.json
          if git diff --staged --quiet; then
            echo "Sin cambios en el catálogo."
          else
            git commit -m "chore: actualizar catálogo desde Mercado Libre"
            git push
          fi
