<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Panel Admin - Renovar Token ML</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #1a2e4a;
      color: #fff;
      padding: 2rem 1.25rem;
    }
    .wrap { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 1.5rem; margin: 0 0 0.5rem; }
    .sub { color: rgba(255,255,255,0.55); font-size: 0.9rem; margin-bottom: 2rem; }
    .btn {
      display: inline-block;
      width: 100%;
      padding: 1rem 1.25rem;
      font-size: 1.05rem;
      font-weight: 700;
      text-align: center;
      color: #fff;
      background: #e63030;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #c92a2a; }
    .btn:disabled { opacity: 0.6; cursor: wait; }
    .panel {
      margin-top: 1.5rem;
      padding: 1.25rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
    }
    .panel h2 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.08em; margin: 0 0 0.75rem; color: rgba(255,255,255,0.5); }
    #code-display {
      word-break: break-all;
      font-family: ui-monospace, monospace;
      font-size: 0.8rem;
      color: #a8d4ff;
    }
    #log { margin-top: 1rem; line-height: 1.7; font-size: 0.95rem; }
    #log .ok { color: #5ee87a; }
    #log .err { color: #ff6b6b; }
    #log .pending { color: rgba(255,255,255,0.7); }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Panel Admin - Renovar Token ML</h1>
    <p class="sub">Renueva el access_token y sincroniza el catálogo con un solo clic tras autorizar en Mercado Libre.</p>

    <a id="btn-auth" class="btn" href="#">Autorizar en Mercado Libre</a>

    <div id="step2" class="panel hidden">
      <h2>Código de autorización</h2>
      <p id="code-display"></p>
    </div>

    <div id="log" class="panel hidden" aria-live="polite"></div>
  </div>

  <script>
    const CLIENT_ID = "2004412570250603";
    const REDIRECT_URI =
      "https://andesautopartscl-sketch.github.io/WebAndesAutoParts/admin/renovar-token.html";
    const WORKER_URL = "https://andes-autoparts-ml-sync.andesautoparts.workers.dev";
    const WORKER_SECRET = "AndesSync2024#SecureKey!";
    const AUTH_URL =
      "https://auth.mercadolibre.cl/authorization?response_type=code&client_id=" +
      CLIENT_ID +
      "&redirect_uri=" +
      encodeURIComponent(REDIRECT_URI) +
      "&scope=offline_access+read+write";

    const btnAuth = document.getElementById("btn-auth");
    const step2 = document.getElementById("step2");
    const codeDisplay = document.getElementById("code-display");
    const logEl = document.getElementById("log");

    btnAuth.href = AUTH_URL;

    function log(msg, type) {
      logEl.classList.remove("hidden");
      const line = document.createElement("div");
      line.className = type || "pending";
      line.textContent = msg;
      logEl.appendChild(line);
    }

    function logClear() {
      logEl.innerHTML = "";
      logEl.classList.remove("hidden");
    }

    async function exchangeCodeViaWorker(code) {
      const res = await fetch(WORKER_URL + "/exchange-code", {
        method: "POST",
        headers: {
          Authorization: "Bearer " + WORKER_SECRET,
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ code, redirect_uri: REDIRECT_URI }),
      });
      const data = await res.json().catch(function () {
        return {};
      });
      if (!res.ok || !data.access_token) {
        throw new Error(data.message || data.error || "Error HTTP " + res.status);
      }
      return data.access_token;
    }

    async function exchangeCodeViaMl(code, clientSecret) {
      const body = new URLSearchParams({
        grant_type: "authorization_code",
        client_id: CLIENT_ID,
        client_secret: clientSecret,
        code: code,
        redirect_uri: REDIRECT_URI,
      });
      const res = await fetch("https://api.mercadolibre.com/oauth/token", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: body,
      });
      const data = await res.json().catch(function () {
        return {};
      });
      if (!res.ok || !data.access_token) {
        throw new Error(data.message || data.error || "OAuth ML falló");
      }
      return data.access_token;
    }

    async function pushTokenToWorker(accessToken) {
      const res = await fetch(WORKER_URL + "/update-token", {
        method: "POST",
        headers: {
          Authorization: "Bearer " + WORKER_SECRET,
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ access_token: accessToken }),
      });
      const data = await res.json().catch(function () {
        return {};
      });
      if (!res.ok) {
        throw new Error(data.message || data.error || "update-token HTTP " + res.status);
      }
    }

    async function runSync() {
      var offset = 0;
      while (true) {
        const res = await fetch(WORKER_URL + "/sync?offset=" + offset, {
          headers: { Authorization: "Bearer " + WORKER_SECRET },
        });
        const data = await res.json().catch(function () {
          return {};
        });
        if (!res.ok || !data.ok) {
          throw new Error(data.message || data.error || "Sync HTTP " + res.status);
        }
        const acc = data.accumulated != null ? data.accumulated : "?";
        const total = data.total != null ? data.total : "?";
        log("✓ Sincronizando... " + acc + "/" + total, "ok");
        if (data.done) {
          return data.products != null ? data.products : total;
        }
        if (data.next_offset == null) {
          break;
        }
        offset = data.next_offset;
      }
      return null;
    }

    async function renovarToken(code) {
      btnAuth.style.pointerEvents = "none";
      btnAuth.textContent = "Procesando...";
      logClear();

      try {
        log("Intercambiando código por token...", "pending");
        var accessToken;
        try {
          accessToken = await exchangeCodeViaWorker(code);
        } catch (workerErr) {
          var secret = sessionStorage.getItem("ml_client_secret") || "";
          if (!secret) {
            secret = prompt(
              "El Worker no pudo intercambiar el código.\nPega ML_CLIENT_SECRET (solo esta vez):"
            );
            if (secret) sessionStorage.setItem("ml_client_secret", secret.trim());
          }
          if (!secret) throw workerErr;
          accessToken = await exchangeCodeViaMl(code, secret.trim());
          await pushTokenToWorker(accessToken);
        }

        log("✓ Token renovado", "ok");
        log("✓ Sincronizando catálogo...", "pending");
        const products = await runSync();
        log("✓ Listo" + (products ? " — " + products + " productos" : ""), "ok");
        btnAuth.textContent = "Completado";
      } catch (err) {
        log("✗ " + (err.message || String(err)), "err");
        btnAuth.style.pointerEvents = "";
        btnAuth.textContent = "Autorizar en Mercado Libre";
      }
    }

    window.onload = function () {
      const params = new URLSearchParams(window.location.search);
      const code = params.get("code");
      if (code) {
        codeDisplay.textContent = code;
        step2.classList.remove("hidden");
        renovarToken(code);
      }
    };
  </script>
</body>
</html>
